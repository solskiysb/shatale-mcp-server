name: "Nightly: Full regression + performance"

on:
  schedule:
    # Every day at 03:00 UTC (05:00 Paris time)
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  nightly-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc

      - name: Check SHATALE_TEST_KEY
        run: |
          if [ -z "$SHATALE_TEST_KEY" ]; then
            echo "::error::SHATALE_TEST_KEY is required for nightly suite"
            exit 1
          fi
        env:
          SHATALE_TEST_KEY: ${{ secrets.SHATALE_TEST_KEY }}

      - name: Run full test suite
        id: tests
        run: npm test -- --reporter=verbose 2>&1 | tee /tmp/test-output.txt
        env:
          SHATALE_TEST_KEY: ${{ secrets.SHATALE_TEST_KEY }}

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server-logs-nightly
          path: /tmp/mcp-test-*.log
          retention-days: 14
          if-no-files-found: ignore

      # ── Notifications ──────────────────────────────────────────

      - name: Telegram notification on failure
        if: failure()
        run: |
          FAILED=$(grep -c "FAIL" /tmp/test-output.txt 2>/dev/null || echo "?")
          TOTAL=$(grep -oP '\d+ passed' /tmp/test-output.txt 2>/dev/null || echo "?")
          curl -sf -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="[!!] <b>MCP Nightly FAILED</b>%0A%0AFailed: ${FAILED} | ${TOTAL}%0ARun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}%0A%0ACheck logs and fix before next deploy." \
            >/dev/null 2>&1 || true
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}

      - name: Create Jira issue on failure
        if: failure()
        run: |
          # Extract failure summary
          SUMMARY="MCP Nightly E2E failure $(date +%Y-%m-%d)"
          BODY="Nightly E2E tests failed.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nCheck artifacts for server logs."

          curl -s -X POST \
            -u "${JIRA_EMAIL}:${JIRA_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${JIRA_URL}/rest/api/3/issue" \
            -d "{
              \"fields\": {
                \"project\": {\"key\": \"SHAT\"},
                \"issuetype\": {\"id\": \"10008\"},
                \"summary\": \"${SUMMARY}\",
                \"description\": {
                  \"type\": \"doc\",
                  \"version\": 1,
                  \"content\": [{\"type\": \"paragraph\", \"content\": [{\"type\": \"text\", \"text\": \"${BODY}\"}]}]
                },
                \"labels\": [\"nightly\", \"e2e\", \"auto-created\"]
              }
            }" >/dev/null 2>&1 || true
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Telegram notification on success
        if: success()
        run: |
          TOTAL=$(grep -oP '\d+ passed' /tmp/test-output.txt 2>/dev/null || echo "all")
          curl -sf -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="[i] MCP Nightly OK — ${TOTAL}" \
            >/dev/null 2>&1 || true
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
