name: "CI: Sandbox (authenticated)"

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sandbox-tests:
    # Only run on internal PRs (not forks) or pushes to main
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc

      # Fail on main if key is missing (no silent skip)
      - name: Check SHATALE_TEST_KEY on main
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -z "$SHATALE_TEST_KEY" ]; then
            echo "::error::SHATALE_TEST_KEY is not configured. Sandbox tests cannot be skipped on main."
            exit 1
          fi
        env:
          SHATALE_TEST_KEY: ${{ secrets.SHATALE_TEST_KEY }}

      - name: Run all tests (public + sandbox)
        run: npm test
        env:
          SHATALE_TEST_KEY: ${{ secrets.SHATALE_TEST_KEY }}

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-server-logs-sandbox
          path: /tmp/mcp-test-*.log
          retention-days: 7
          if-no-files-found: ignore

  # Status check for fork PRs (sandbox skipped)
  sandbox-skipped:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - run: echo "Sandbox tests skipped for fork PR"
